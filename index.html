<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABP Modulo 3</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container vh-100 d-flex justify-content-center align-items-center">
        <div class="card shadow-lg" style="width: 360px;">
            <div class="card-body">

                <h3 class="text-center mb-4">ABPCalculator</h3>


                <input type="text" class="form-control form-control-lg text-end mb-3" placeholder="0" readonly>


                <div class="row g-2">

                    <div class="col-6">
                        <button class="btn btn-danger w-100">C</button>
                    </div>

                    <div class="col-3">
                        <button class="btn btn-warning w-100">⌫</button>
                    </div>

                    <div class="col-3">
                        <button class="btn btn-secondary w-100">÷</button>
                    </div>

                    <div class="col-3">
                        <button class="btn btn-light w-100">7</button>
                    </div>

                    <div class="col-3">
                        <button class="btn btn-light w-100">8</button>
                    </div>

                    <div class="col-3">
                        <button class="btn btn-light w-100">9</button>
                    </div>

                    <div class="col-3">
                        <button class="btn btn-secondary w-100">×</button>
                    </div>

                    <div class="col-3">
                        <button class="btn btn-light w-100">4</button>
                    </div>

                    <div class="col-3">
                        <button class="btn btn-light w-100">5</button>
                    </div>

                    <div class="col-3">
                        <button class="btn btn-light w-100">6</button>
                    </div>

                    <div class="col-3">
                        <button class="btn btn-secondary w-100">−</button>
                    </div>

                    <div class="col-3">
                        <button class="btn btn-light w-100">1</button>
                    </div>

                    <div class="col-3">
                        <button class="btn btn-light w-100">2</button>
                    </div>

                    <div class="col-3">
                        <button class="btn btn-light w-100">3</button>
                    </div>

                    <div class="col-3">
                        <button class="btn btn-secondary w-100">+</button>
                    </div>

                    <div class="col-6">
                        <button class="btn btn-light w-100">0</button>
                    </div>

                    <div class="col-3">
                        <button class="btn btn-light w-100">.</button>
                    </div>

                    <div class="col-3">
                        <button class="btn btn-primary w-100">=</button>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script src="./assets/js/main.js"></script>
</body>

</html>
